<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclutamiento - USACH Space Program</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        /* === ESTILOS BASE === */
        :root {
            --nasa-blue: #0B3D91;
            --nasa-red: #FC3D21;
            --dark-bg: #000000;
            --darker-bg: #0a0a0a;
            --card-bg: #151515;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            scroll-behavior: smooth;
        }

        /* === BARRA DE NAVEGACIÓN === */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .nav-brand { font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links a {
            color: var(--text-main); text-decoration: none; margin-left: 25px;
            font-size: 0.85rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; transition: color 0.3s ease;
        }
        .nav-links a:hover { color: var(--nasa-blue); }
        .nav-links .btn-login {
            background-color: transparent; border: 1px solid var(--text-main);
            padding: 8px 15px; border-radius: 4px;
        }
        .nav-links .btn-login:hover { background-color: var(--text-main); color: var(--dark-bg); }

        /* === CONTENEDOR DEL FORMULARIO === */
        .registro-section {
            padding: 120px 10% 80px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('luna.png') no-repeat center center/cover;
            position: relative;
        }

        .registro-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
        }

        .form-container {
            background-color: var(--card-bg);
            padding: 50px;
            border-radius: 8px;
            border-top: 4px solid var(--nasa-blue);
            width: 100%;
            max-width: 600px;
            z-index: 1;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h1 {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 2.2rem;
        }

        .form-header p {
            color: var(--text-muted);
            margin-top: 10px;
            font-size: 1rem;
        }

        /* === ESTILOS DE LOS INPUTS === */
        .form-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: bold;
            color: #ddd;
            letter-spacing: 1px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .form-group input {
            padding: 12px 15px;
            background-color: #222;
            border: 1px solid #444;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--nasa-blue);
            background-color: #2a2a2a;
        }

        .form-group .help-text {
            font-size: 0.8rem;
            color: #777;
            margin-top: 5px;
        }

        /* === BOTÓN DE ENVÍO === */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: var(--nasa-blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        .btn-submit:hover { background-color: #082d6b; }
        .btn-submit:active { transform: scale(0.98); }

    </style>
</head>
<body>

    <header>
        <div class="nav-brand">USACH Space Program</div>
        <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="proyectos.html">Proyectos</a>
            <a href="ejes.html">Ejes de Desarrollo</a>
            <a href="registro.html">Registrarse</a>
            <a href="#login" class="btn-login">Iniciar Sesión</a>
        </nav>
    </header>

    <section class="registro-section">
        <div class="form-container">
            
            <div class="form-header">
                <h1>Únete a la Misión</h1>
                <p>Ingresa tus datos y serás redirigido para agendar tu entrevista.</p>
            </div>

            <form id="reclutamientoForm">
                
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre y apellido" required>
                </div>

                <div class="form-group">
                    <label for="carrera">Carrera</label>
                    <input type="text" id="carrera" name="carrera" placeholder="Ej: Ingeniería Civil Mecatrónica" required>
                </div>

                <div class="form-group">
                    <label for="cv_link">Enlace a tu CV</label>
                    <input type="url" id="cv_link" name="cv_link" placeholder="Ej: https://drive.google.com/..." required>
                    <span class="help-text">Asegúrate de que el enlace sea público (Drive, LinkedIn, Notion, etc.)</span>
                </div>

                <button type="submit" class="btn-submit">Continuar a Agendar</button>
            </form>

        </div>
    </section>
<script>
        document.getElementById('reclutamientoForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página intente recargar

            // Cambiamos el texto del botón para feedback visual
            const btn = document.querySelector('.btn-submit');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = 'Transmitiendo coordenadas...';

            // Capturamos los datos ingresados por el postulante
            const nombre = document.getElementById('nombre').value;
            const carrera = document.getElementById('carrera').value;
            const cv = document.getElementById('cv_link').value;

            // URL original de tu form (cambiando viewform por formResponse)
            const urlGoogleForm = 'https://docs.google.com/forms/d/e/1FAIpQLSf5ad1kQyhQqIUZXvP8V7Yt5WdOlDS4ruzRX9Rizw7PdsRE7w/formResponse';

            // Armamos el paquete de datos con tus Entry IDs secretos
            const formData = new URLSearchParams();
            formData.append('entry.957077564', nombre);
            formData.append('entry.2006805985', carrera);
            formData.append('entry.1483108375', cv);

            // Enviamos los datos en secreto (modo no-cors es vital para no ser bloqueados)
            fetch(urlGoogleForm, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData.toString()
            }).then(() => {
                // ¡Éxito! Los datos ya están en tu Excel. Redirigimos al calendario:
                window.location.href = 'https://calendar.app.google/UBCXpNTu1HNcAXAg9';
            }).catch((error) => {
                console.error('Error en la transmisión:', error);
                btn.innerHTML = 'Error en la conexión. Intenta de nuevo.';
                setTimeout(() => btn.innerHTML = textoOriginal, 3000);
            });
        });
    </script>
</body>
</html>
