<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - USACH Space Program</title>
    
    <link rel="icon" type="image/png" href="./src/assets/logo.png">
    <link rel="stylesheet" href="./src/styles/main.css">
    
    <style>
        /* === LOGIN LAYOUT === */
        .login-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #020204, #08080f);
            position: relative;
            box-sizing: border-box;
            padding: 20px;
        }
        .login-card {
            background-color: var(--space-card);
            border: 1px solid var(--border-subtle);
            padding: 50px;
            border-radius: 8px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
            z-index: 10;
            position: relative;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--nasa-red), transparent);
        }
        .login-card h2 {
            font-family: var(--font-title);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            color: var(--pure-white);
            font-size: 1.8rem;
        }
        .login-card p {
            font-family: var(--font-body);
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }
        .btn-portal {
            display: inline-block;
            background-color: transparent;
            border: 1px solid var(--border-highlight);
            color: var(--bone-white);
            padding: 14px 35px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            border-radius: 4px;
            letter-spacing: 1.5px;
            transition: var(--transition-smooth);
            width: 100%;
            box-sizing: border-box;
        }
        .btn-portal:hover {
            background-color: var(--bone-white);
            color: var(--space-black);
            border-color: var(--bone-white);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        @media (max-width: 768px) {
            .login-card { padding: 40px 25px; }
        }
    </style>
</head>
<body class="tech-grid">

    <!-- Load Header component -->
    <load src="src/components/header.html" root="./" />

    <section class="login-section">
        <div class="login-card">
            <h2 style="color: var(--nasa-red); text-shadow: 0 0 10px rgba(252,61,33,0.15);">Acceso Denegado</h2>
            <p>El portal de operaciones de vuelo y acceso al manifiesto de tripulantes de Usach Space Program se encuentra restringido a directores autorizados y personal técnico de control de misión.</p>
            <a href="index.html" class="btn-portal">Volver al Inicio</a>
        </div>
    </section>

    <!-- Global Footer -->
    <load src="src/components/footer.html" root="./" />

</body>
</html>
